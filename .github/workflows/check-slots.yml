name: Tennis Slot Checker

on:
  schedule:
    # Every 15 minutes, 01:00–16:00 Munich time (CEST = UTC+2)
    # 01:00 CEST = 23:00 UTC (previous day), so we need two lines to cover the UTC midnight crossover
    - cron: '*/15 23 * * *'   # covers 01:00–01:45 CEST
    - cron: '*/15 0-14 * * *' # covers 02:00–16:00 CEST
  workflow_dispatch:  # Adds a "Run workflow" button on GitHub so you can trigger it manually

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run slot checker (single-run mode)
        env:
          ZHS_EMAIL: ${{ secrets.ZHS_EMAIL }}
          ZHS_PASSWORD: ${{ secrets.ZHS_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS: 'true'
          RUN_ONCE: 'true'
        run: python3 checker.py
