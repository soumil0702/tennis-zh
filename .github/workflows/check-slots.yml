name: Tennis Slot Checker

on:
  schedule:
    # Every 3 hours — each job runs for 3.5 hours, so there is always an active job
    # with a ~0.5 hour overlap between old and new (overlap = brief duplicate notifications)
    # Window: 01:00–16:00 Munich (CEST = UTC+2) = 23:00–14:00 UTC (crosses midnight)
    - cron: '0 23 * * *'  # 01:00 CEST
    - cron: '0 2 * * *'   # 04:00 CEST
    - cron: '0 5 * * *'   # 07:00 CEST
    - cron: '0 8 * * *'   # 10:00 CEST
    - cron: '0 11 * * *'  # 13:00 CEST
  workflow_dispatch:  # Adds a "Run workflow" button on GitHub so you can trigger it manually

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 240  # 4-hour safety cap (GitHub hard limit is 6h)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run slot checker (loop mode, 3.5 h max)
        env:
          ZHS_EMAIL: ${{ secrets.ZHS_EMAIL }}
          ZHS_PASSWORD: ${{ secrets.ZHS_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS: 'true'
          MAX_RUNTIME_SECONDS: '12600'  # 3.5 hours
        run: python3 checker.py
